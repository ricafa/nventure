name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: nventure_test
          POSTGRES_USER: nventure
          POSTGRES_PASSWORD: nventure
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U nventure -d nventure_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: bcmath, intl, pdo_pgsql, pgsql, zip
          coverage: none

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install frontend dependencies
        run: npm install

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate --ansi

      - name: Pint
        run: vendor/bin/pint --test

      - name: PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=512M

      - name: Tests
        env:
          APP_ENV: testing
          APP_KEY: base64:U4u3c+YPNGVWlhwQmCxuPV9sQn04mxrXg3k/yw2q9FE=
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: nventure_test
          DB_USERNAME: nventure
          DB_PASSWORD: nventure
        run: vendor/bin/pest
